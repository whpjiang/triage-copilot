server:
  port: 8080

spring:
  main:
    lazy-initialization: true
  application:
    name: triage-copilot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/triage_copilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      initialization-fail-timeout: -1
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-max

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
