spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:triage;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init.sql
  ai:
    model:
      chat: none
    dashscope:
      enabled: false
      api-key: ""

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
